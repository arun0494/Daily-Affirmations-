<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Affirmations</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

body {
  margin:0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#4facfe,#00f2fe);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  transition:0.3s;
}

body.dark{
  background: linear-gradient(135deg,#1f1f1f,#2c2c2c);
}

.container{
  text-align:center;
  width:90%;
  max-width:420px;
}

.card{
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding:30px;
  border-radius:25px;
  box-shadow:0 10px 35px rgba(0,0,0,0.25);
  transition: transform 0.3s;
}

.card:hover{
  transform: translateY(-5px);
}

h1{
  margin-bottom:15px;
  font-weight:600;
  font-size:1.8rem;
}

#affirmation{
  font-size:20px;
  margin:25px 0;
  min-height:80px;
  animation: fade 0.5s ease;
}

@keyframes fade{
  from{opacity:0;}
  to{opacity:1;}
}

button{
  margin:6px;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:14px;
  font-weight:500;
  background:#fff;
  color:#333;
  transition: transform 0.2s, background 0.3s;
}

button:hover{
  transform:scale(1.08);
  background:#f1f1f1;
}

.toggle{
  margin-top:12px;
  font-size:13px;
  cursor:pointer;
  opacity:0.9;
}

.ad{
  margin-top:20px;
  background: rgba(255,255,255,0.15);
  padding:12px;
  border-radius:12px;
  font-size:13px;
  color:#fff;
  text-align:center;
}

@media(max-width:400px){
  h1{font-size:1.5rem;}
  #affirmation{font-size:18px;}
  button{padding:10px 14px;font-size:13px;}
}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>Daily Affirmations ✨</h1>
    <div id="affirmation">Click "New" to get inspired 💪</div>

    <button onclick="newAffirmation()">New</button>
    <button onclick="copyText()">Copy</button>
    <button onclick="shareText()">Share</button>
    <button onclick="saveFav()">Save ❤️</button>

    <div class="toggle" onclick="toggleMode()">🌙 Toggle Dark Mode</div>

    <div class="ad">
      Your Ad Here (AdMob / Adsterra Compatible)
    </div>
  </div>
</div>

<script>
const affirmations=[
"I am confident and strong 💪","I believe in myself ✨","I can achieve anything 🚀",
"I am improving every day 📈","I attract success 💰","I am focused 🔥",
"I deserve happiness 😊","I am unstoppable 💯","I am powerful ⚡",
"I create my future 🌟","I am calm and relaxed 🌿","I think positive thoughts ☀️",
"I grow stronger every day 🧠","I achieve my goals 🎯","I am fearless 🦁",
"I am disciplined 📚","I am unique 🌈","I trust my journey 🛤️",
"I am grateful 🙏","I am creative 🎨","I attract opportunities 🚪",
"I believe in my dreams 🌙","I stay motivated 💥","I take action 🏃",
"I am patient ⏳","I am successful 💼","I radiate confidence 😎",
"I love myself ❤️","I stay focused 🎯","I keep learning 📖"
];

function newAffirmation(){
  const random=affirmations[Math.floor(Math.random()*affirmations.length)];
  const affirmEl=document.getElementById("affirmation");
  affirmEl.style.opacity=0;
  setTimeout(()=>{affirmEl.innerText=random; affirmEl.style.opacity=1;},200);
}

function copyText(){
  const text=document.getElementById("affirmation").innerText;
  navigator.clipboard.writeText(text).then(()=>{alert("Copied!");});
}

function shareText(){
  const text=document.getElementById("affirmation").innerText;
  if(navigator.share){navigator.share({text});}
  else{alert("Sharing not supported");}
}

function toggleMode(){
  document.body.classList.toggle("dark");
}

function saveFav(){
  const text=document.getElementById("affirmation").innerText;
  localStorage.setItem("fav",text);
  alert("Saved!");
}

window.onload=()=>{
  const saved=localStorage.getItem("fav");
  if(saved)document.getElementById("affirmation").innerText=saved;
}
</script>
</body>
</html>
