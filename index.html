<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Affirmations</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  transition: 0.3s;
}

.dark {
  background: #121212;
}

.container {
  text-align: center;
  width: 90%;
  max-width: 400px;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}

h1 {
  margin-bottom: 10px;
}

#affirmation {
  font-size: 20px;
  margin: 20px 0;
  min-height: 70px;
  animation: fade 0.5s ease;
}

@keyframes fade {
  from {opacity: 0;}
  to {opacity: 1;}
}

button {
  margin: 6px;
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  background: white;
  color: #333;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.toggle {
  margin-top: 10px;
  font-size: 12px;
  cursor: pointer;
}

.ad {
  margin-top: 15px;
  background: rgba(255,255,255,0.2);
  padding: 10px;
  border-radius: 10px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>Daily Affirmations ✨</h1>

    <div id="affirmation">Click below to get inspired 💪</div>

    <button onclick="newAffirmation()">New</button>
    <button onclick="copyText()">Copy</button>
    <button onclick="shareText()">Share</button>
    <button onclick="saveFav()">Save ❤️</button>

    <div class="toggle" onclick="toggleMode()">🌙 Toggle Dark Mode</div>

    <!-- Adsterra Banner -->
    <div class="ad">
      Your Ad Here
    </div>

  </div>
</div>

<script>
const affirmations = [
"I am confident and strong 💪","I believe in myself ✨","I can achieve anything 🚀",
"I am improving every day 📈","I attract success 💰","I am focused 🔥",
"I deserve happiness 😊","I am unstoppable 💯","I am powerful ⚡",
"I create my future 🌟","I am calm and relaxed 🌿","I think positive thoughts ☀️",
"I grow stronger every day 🧠","I achieve my goals 🎯","I am fearless 🦁",
"I am disciplined 📚","I am unique 🌈","I trust my journey 🛤️",
"I am grateful 🙏","I am creative 🎨","I attract opportunities 🚪",
"I believe in my dreams 🌙","I stay motivated 💥","I take action 🏃",
"I am patient ⏳","I am successful 💼","I radiate confidence 😎",
"I love myself ❤️","I stay focused 🎯","I keep learning 📖"
];

function newAffirmation() {
  const random = affirmations[Math.floor(Math.random() * affirmations.length)];
  document.getElementById("affirmation").innerText = random;
}

function copyText() {
  const text = document.getElementById("affirmation").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

function shareText() {
  const text = document.getElementById("affirmation").innerText;
  if (navigator.share) {
    navigator.share({ text: text });
  } else {
    alert("Sharing not supported");
  }
}

function toggleMode() {
  document.body.classList.toggle("dark");
}

function saveFav() {
  const text = document.getElementById("affirmation").innerText;
  localStorage.setItem("fav", text);
  alert("Saved!");
}

// Load saved
window.onload = () => {
  const saved = localStorage.getItem("fav");
  if (saved) {
    document.getElementById("affirmation").innerText = saved;
  }
}
</script>

</body>
</html>
