<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Affirmations</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.dark{
  background:#121212;
}

.card{
  width:90%;
  max-width:400px;
  padding:25px;
  border-radius:20px;
  text-align:center;
  background:rgba(255,255,255,0.1);
}

button{
  margin:5px;
  padding:10px;
  border:none;
  border-radius:10px;
}

.ad{
  margin-top:15px;
  padding:10px;
  background:rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="card">
  <h2>Daily Affirmations ✨</h2>

  <p id="text">Click New</p>

  <button onclick="newText()">New</button>
  <button onclick="copy()">Copy</button>
  <button onclick="share()">Share</button>
  <button onclick="save()">Save</button>

  <br><br>
  <button onclick="toggle()">🌙 Dark Mode</button>

  <div class="ad">Ad Space</div>
</div>

<script>
const data=[
"I am strong 💪","I believe in myself ✨","I am focused 🔥",
"I am successful 💼","I attract success 💰"
];

function newText(){
 document.getElementById("text").innerText=
 data[Math.floor(Math.random()*data.length)];
}

function copy(){
 navigator.clipboard.writeText(text.innerText);
 alert("Copied");
}

function share(){
 if(navigator.share){
   navigator.share({text:text.innerText});
 }else{
   alert("Share not supported");
 }
}

function save(){
 localStorage.setItem("fav",text.innerText);
 alert("Saved");
}

function toggle(){
 document.body.classList.toggle("dark");
}

window.onload=()=>{
 let f=localStorage.getItem("fav");
 if(f) text.innerText=f;
}
</script>

</body>
</html>
